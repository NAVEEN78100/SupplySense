name: Security Scan

on:
  push:
    branches: [dev, main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔍 TruffleHog - Git history
      - name: TruffleHog Scan (Git History)
        uses: trufflesecurity/trufflehog@main
        with:
          scan: git

      # 🔍 TruffleHog - Filesystem
      - name: TruffleHog Scan (Filesystem)
        uses: trufflesecurity/trufflehog@main
        with:
          scan: filesystem
          path: .

      # 🔍 Gitleaks → SARIF (saved locally)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --report-format sarif --report-path results.sarif

      # 📦 Upload results as artifact (THIS replaces SARIF upload)
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: results.sarif
